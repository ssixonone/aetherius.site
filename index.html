<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherius | Vertex Grips</title>
    <meta name="description" content="Premium Vertex Grips. Minimalist design, maximum performance. Order directly via WhatsApp.">
    <link rel="icon" type="image/webp" href="images/favicon.webp">
    
    <style>
        /* CSS Reset & Brutalist Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text-color);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a, .cart-btn {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-links a:hover, .cart-btn:hover {
            text-decoration: underline;
        }

        /* Product Layout (CSS Grid) */
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 80px);
        }

        /* Slideable Image Gallery */
        .gallery-section {
            border-right: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #f9f9f9;
        }

        .slider-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            border: 2px solid var(--border-color);
            /* Hide scrollbar for a cleaner look */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        .slider::-webkit-scrollbar {
            display: none;
        }

        .slider img {
            flex: 0 0 100%;
            scroll-snap-align: center;
            /* CRITICAL: Enforcing 1:1 Aspect Ratio */
            aspect-ratio: 1 / 1;
            object-fit: cover; 
            width: 100%;
            display: block;
        }

        .slider-instructions {
            text-align: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 1rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* Product Details */
        .details-section {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1.product-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .price {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .description {
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 400px;
        }

        /* Action Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 1.2rem;
            text-align: center;
            background-color: var(--text-color);
            color: var(--bg-color);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Footer */
        footer {
            border-top: 2px solid var(--border-color);
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        footer a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 1rem;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Mobile Responsiveness */
        @media(max-width: 900px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .gallery-section {
                border-right: none;
                border-bottom: 2px solid var(--border-color);
                padding: 1rem;
            }
            .details-section {
                padding: 2rem;
            }
            h1.product-title {
                font-size: 2.5rem;
            }
            .nav-links {
                display: none; /* Can be replaced with a horizontal scroll menu later */
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Aetherius</a>
        <nav class="nav-links">
            <a href="#">Products</a>
            <a href="#">About</a>
        </nav>
        <button class="cart-btn" onclick="checkoutWhatsApp()">Cart (0)</button>
    </header>

    <main class="product-container">
        
        <section class="gallery-section">
            <div class="slider-wrapper">
                <div class="slider">
                    <img src="images/VertexGrips/VertexGrips-1.jpg" alt="Vertex Grips Photo 1">
                    <img src="images/VertexGrips/VertexGrips-2.jpg" alt="Vertex Grips Photo 2">
                    <img src="images/VertexGrips/VertexGrips-3.jpg" alt="Vertex Grips Photo 3">
                    <img src="images/VertexGrips/VertexGrips-4.jpg" alt="Vertex Grips Photo 4">
                    <img src="images/VertexGrips/VertexGrips-5.jpg" alt="Vertex Grips Photo 5">
                </div>
                <div class="slider-instructions">Swipe / Scroll to view more</div>
            </div>
        </section>

        <section class="details-section">
            <h1 class="product-title">Vertex Grips</h1>
            <div class="price"IDR 115.000</div>
            <p class="description">
                Engineered for maximum control and tactile feedback. Our signature brutalist design meets ergonomic precision. Designed for the modern rider.
            </p>
            
            <button class="btn" onclick="checkoutWhatsApp()">Order via WhatsApp</button>
        </section>

    </main>

    <footer>
        <div>&copy; 2026 Aetherius.site</div>
        <div>
            <a href="#" onclick="checkoutWhatsApp('inquiry')">Shipping Info</a>
            <a href="#" onclick="checkoutWhatsApp('inquiry')">Returns</a>
        </div>
    </footer>

    <script>
        // WhatsApp Integration Logic
        function checkoutWhatsApp(type = 'order') {
            // IMPORTANT: Replace '6281234567890' with your actual WhatsApp Business Number
            // Omit the '+' symbol, just use the country code and number.
            const phoneNumber = "6289665774307"; 
            
            let message = "";
            if (type === 'order') {
                message = "Hello Aetherius! I would like to order the Vertex Grips.";
            } else if (type === 'inquiry') {
                message = "Hello Aetherius, I have a question regarding shipping or returns.";
            }

            // Encode the text so it forms a valid URL
            const encodedMessage = encodeURIComponent(message);
            const waLink = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
            
            // Opens WhatsApp securely in a new tab
            window.open(waLink, '_blank');
        }
    </script>
</body>
</html>
