<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeth3rius</title>
    <link rel="icon" href="images/favicon.webp" type="image/webp">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           DESIGN SYSTEM (VARIABLES)
           ========================================== */
        :root {
            --bg-color: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-blue: #0088cc;
            --accent-blue-hover: #0077b3;
            --discount-red: #e63946; /* Harsh red for discounts */
            --border-radius: 12px;
            --font-main: 'Inter', sans-serif;
        }

        /* ==========================================
           GLOBAL RESETS
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ==========================================
           HEADER & NAVIGATION
           ========================================== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        nav a:hover {
            color: var(--accent-blue);
            transition: color 0.2s ease;
        }

        /* ==========================================
           LAYOUT & CONTAINERS
           ========================================== */
        .container {
            max-width: 1000px; /* Widened for Desktop Grid */
            margin: 0 auto;
            padding: 100px 20px 40px 20px;
        }

        section {
            margin-bottom: 80px;
        }

        /* Note 5: Dynamic for Phone and Desktop */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobile: Stacks vertically */
            gap: 30px;
        }

        /* ==========================================
           PRODUCT CARDS
           ========================================== */
        .product-card {
            background: #111111;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        /* 1:1 Image Slider */
        .slider-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000;
            position: relative;
            margin-bottom: 20px;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            width: 100%;
            height: 100%;
        }

        .slider::-webkit-scrollbar {
            display: none;
        }

        .slider img {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: center;
            object-fit: contain;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1; /* Pushes buttons to the bottom evenly */
        }

        .product-info h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        /* Note 3: Discounted Price Logic */
        .price-container {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .original-price {
            font-size: 1rem;
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .discount-badge {
            background-color: var(--discount-red);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 0.95rem;
            color: #cccccc;
            margin-bottom: 25px;
        }

        /* ==========================================
           CHECKOUT ZONE (BUTTONS)
           ========================================== */
        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto; /* Always aligns to the bottom of the card */
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 15px;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 136, 204, 0.1);
        }

        /* ==========================================
           PORTFOLIO SECTION
           ========================================== */
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .portfolio-item {
            aspect-ratio: 1 / 1;
            background: #111;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ==========================================
           MEDIA QUERIES (DESKTOP ADJUSTMENTS)
           ========================================== */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr); /* Desktop: Side by side */
            }
            .portfolio-grid {
                grid-template-columns: repeat(4, 1fr); /* Desktop: 4 items in a row */
            }
        }

        /* ==========================================
           FOOTER
           ========================================== */
        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

    </style>
</head>

        </nav>

                            <img src="images/VertexGrips/VertexGrips-4.jpg" alt="Vertex Grips Angle 4">
                            <img src="images/VertexGrips/VertexGrips-5.jpg" alt="Vertex Grips Angle 5">

                    </div>
