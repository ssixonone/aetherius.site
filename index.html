<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETH3RIUS - Custom Cycling Gear</title>
    <link rel="icon" type="image/webp" href="images/favicon.webp">
    
    <style>
        /* Brutalist / aframecycles.com Inspired Aesthetic */
        :root {
            --border-color: #000;
            --bg-color: #f4f4f0; 
            --text-color: #000;
            --font-stack: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --accent-color: #e60000; /* Brutalist Red for discounts */
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            text-transform: uppercase;
            line-height: 1.2;
            -webkit-font-smoothing: antialiased;
        }
        
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        /* Desktop Constrained Wrapper */
        .wrapper { 
            width: 92%; 
            max-width: 1280px; 
            margin: 4vh auto; 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            min-height: 85vh; 
            background-color: #fff; 
        }
        
        /* Header Segment */
        header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--border-color); 
            padding: 1.5rem;
        }
        
        .logo { 
            font-size: 2.5rem; 
            font-weight: 800; 
            letter-spacing: -0.05em; 
        }
        
        nav { display: flex; gap: 3rem; align-items: center; }
        .nav-links { display: flex; gap: 2rem; font-weight: 500; }
        .cart-btn { cursor: pointer; font-weight: bold; background: #000; color: #fff; padding: 0.5rem 1rem; border-radius: 50px; }
        .cart-btn:hover { background: #333; }
        
        /* Split Screen Main Layout */
        main { display: flex; flex-wrap: wrap; flex-grow: 1; }
        .product-visual, .product-info { flex: 1; min-width: 300px; }
        
        /* Left Side: Product Gallery */
        .product-visual {
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #f4f4f0;
        }
        
        /* Strict 1:1 Aspect Ratio Box */
        .slider-container {
            width: 100%; 
            aspect-ratio: 1 / 1; 
            position: relative; 
            overflow: hidden;
            background: #fff;
        }
        
        .slide {
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; 
            transition: opacity 0.15s ease-in-out;
        }
        
        .slide.active { opacity: 1; z-index: 1; }
        
        .slider-controls {
            display: flex; 
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }
        
        .slider-btn {
            flex: 1; 
            padding: 1.5rem; 
            text-align: center; 
            cursor: pointer;
            background: transparent; 
            border: none; 
            border-right: 1px solid var(--border-color);
            font-family: inherit; 
            font-size: 1.1rem; 
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .slider-btn:last-child { border-right: none; }
        .slider-btn:hover { background: #000; color: #fff; }

        /* Right Side: Brutalist Typography & Info */
        .product-info {
            padding: 4rem 3rem; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }
        
        .product-title { 
            font-size: clamp(3.5rem, 6vw, 7rem); 
            font-weight: 800; 
            letter-spacing: -0.06em; 
            margin-bottom: 1rem; 
            line-height: 0.85; 
        }
        
        /* Updated Pricing Styling */
        .product-price { 
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem; 
            flex-wrap: wrap;
        }

        .original-price {
            font-size: 1.5rem;
            font-weight: 500;
            text-decoration: line-through;
            color: #777; /* De-emphasized gray */
        }

        .discount-price {
            font-size: 2.5rem; 
            font-weight: 700;
            color: var(--accent-color);
        }
        
        .product-desc { 
            font-size: 1.1rem; 
            margin-bottom: 4rem; 
            max-width: 90%; 
            text-transform: none; 
            line-height: 1.6; 
            font-weight: 500;
        }
        
        /* Hard-Edged Buttons */
        .action-btns { display: flex; flex-direction: column; gap: 1rem; }
        .btn {
            padding: 1.5rem; 
            font-size: 1.2rem; 
            font-family: inherit; 
            text-transform: uppercase;
            cursor: pointer; 
            text-align: center; 
            font-weight: 800; 
            transition: all 0.2s;
        }
        
        .btn-secondary { background: transparent; color: #000; border: 2px solid #000; }
        .btn-secondary:hover { background: #e0e0e0; }
        
        .btn-primary { background: #000; color: #fff; border: 2px solid #000; }
        .btn-primary:hover { background: #fff; color: #000; }
        
        /* Footer Segment */
        footer { 
            display: flex; 
            justify-content: space-between; 
            padding: 1.5rem; 
            border-top: 1px solid var(--border-color); 
            font-size: 0.9rem; 
            font-weight: bold;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .wrapper { width: 100%; margin: 0; border: none; min-height: 100vh; }
            .product-visual { border-right: none; border-bottom: 1px solid var(--border-color); }
            header { flex-direction: column; gap: 1.5rem; }
            nav { width: 100%; justify-content: space-between; }
            .nav-links { 
                overflow-x: auto; 
                white-space: nowrap; 
                scrollbar-width: none; 
            }
            .nav-links::-webkit-scrollbar { display: none; }
            .product-info { padding: 2rem 1.5rem; }
            .product-title { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">AETH3RIUS</div>
            <nav>
                <div class="nav-links">
                    <a href="#">Shop</a>
                    <a href="#">About</a>
                    <a href="#">Journal</a>
                </div>
                <div class="cart-btn" id="cartTrigger">CART (<span id="cartCount">0</span>)</div>
            </nav>
        </header>

        <main>
            <section class="product-visual">
                <div class="slider-container">
                    <img src="images/VertexGrips/VertexGrips-1.jpg" alt="Vertex Grips Angle 1" class="slide active">
                    <img src="images/VertexGrips/VertexGrips-2.jpg" alt="Vertex Grips Angle 2" class="slide">
                    <img src="images/VertexGrips/VertexGrips-3.jpg" alt="Vertex Grips Angle 3" class="slide">
                    <img src="images/VertexGrips/VertexGrips-4.jpg" alt="Vertex Grips Angle 4" class="slide">
                    <img src="images/VertexGrips/VertexGrips-5.jpg" alt="Vertex Grips Angle 5" class="slide">
                </div>
                <div class="slider-controls">
                    <button class="slider-btn" onclick="prevSlide()">Prev</button>
                    <button class="slider-btn" onclick="nextSlide()">Next</button>
                </div>
            </section>

            <section class="product-info">
                <div>
                    <h1 class="product-title">VERTEX GRIPS</h1>
                    
                    <div class="product-price">
                        <span class="original-price">IDR 135.000</span>
                        <span class="discount-price">IDR 115.000</span>
                    </div>

                    <p class="product-desc">Uncompromising control meets brutalist design. Precision-engineered for maximum tactile response and durability. Step into the new standard of hardware.</p>
                </div>
                
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="addToCart()">Add to Cart</button>
                    <button class="btn btn-primary" onclick="checkoutNow()">Order Now</button>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-links">
                <a href="#" onclick="checkoutNow(); return false;">Shipping</a> &nbsp;&nbsp;|&nbsp;&nbsp; 
                <a href="#" onclick="checkoutNow(); return false;">Returns</a>
            </div>
            <div class="copyright">&copy; 2026 AETH3RIUS</div>
        </footer>
    </div>

    <script>
        // --- Image Slider Logic ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        
        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            if(index >= slides.length) currentSlide = 0;
            if(index < 0) currentSlide = slides.length - 1;
            slides[currentSlide].classList.add('active');
        }
        
        function nextSlide() { currentSlide++; showSlide(currentSlide); }
        function prevSlide() { currentSlide--; showSlide(currentSlide); }

        // --- WhatsApp Cart Logic ---
        let cartQty = 0;
        
        // DEFAULT WHATSAPP NUMBER UPDATED
        const whatsappNumber = "6289665774307"; 
        
        function updateCartDisplay() {
            document.getElementById('cartCount').innerText = cartQty;
        }

        function addToCart() {
            cartQty++;
            updateCartDisplay();
            alert("Vertex Grips added to cart.");
        }

        function checkoutNow() {
            let qtyToOrder = cartQty > 0 ? cartQty : 1; 
            // Automatically calculating the total IDR for convenience in the WhatsApp message
            let totalPrice = (qtyToOrder * 115).toLocaleString('id-ID'); 
            
            let message = `Hello Aeth3rius! I would like to order: %0A- ${qtyToOrder}x Vertex Grips (IDR 115.000)%0A%0A*Total: IDR ${totalPrice}.000*%0A%0APlease let me know the payment details and shipping process.`;
            
            let whatsappUrl = `https://wa.me/${whatsappNumber}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        document.getElementById('cartTrigger').addEventListener('click', () => {
            if(cartQty > 0) {
                checkoutNow();
            } else {
                alert("Your cart is empty. Add a product first or click Order Now.");
            }
        });
    </script>
</body>
</html>
